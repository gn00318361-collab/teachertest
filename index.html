<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>青溪國小代理代課教師甄試控制台｜三視角試務檢查就位版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="today.css" />
  </head>
  <body>
    <header class="hero-banner text-center shadow-sm">
      <div class="container-fluid px-3 px-lg-5">
        <h1 class="fw-bold h3 mb-2">🏫 桃園市桃園區青溪國民小學</h1>
        <p class="mb-2 lead fw-semibold">115學年度代理代課教師甄試控制台｜三視角試務檢查就位版</p>
        <p class="badge bg-warning text-dark fs-6 mb-3">7/8新版分流：01-03先試教、04-06先口試，第二輪交換場地</p>
        <div class="d-flex flex-column flex-md-row justify-content-center gap-2 align-items-center">
          <span id="liveClock" class="badge bg-dark px-3 py-2">載入時間中...</span>
          <a class="btn btn-light btn-sm fw-bold" href="./index.html">三視角首頁</a>
          <button id="resetThreeViews" class="btn btn-outline-light btn-sm fw-bold" type="button">重設三視角資料</button>
        </div>
      </div>
    </header>

    <main class="container-fluid px-3 px-lg-5 py-4">
      <section class="view-switch card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-2 text-center">
            <div class="col-md-4">
              <button class="btn btn-primary btn-lg fw-bold view-button active w-100" data-view="candidate" type="button">📱 考生資訊模式</button>
            </div>
            <div class="col-md-4">
              <button class="btn btn-outline-success btn-lg fw-bold view-button w-100" data-view="judge" type="button">📋 評審委員模式</button>
            </div>
            <div class="col-md-4">
              <button class="btn btn-outline-warning btn-lg fw-bold view-button w-100" data-view="admin" type="button">⚙️ 試務行政模式</button>
            </div>
          </div>
        </div>
      </section>

      <section id="candidateView" class="view-panel active" aria-labelledby="candidate-title">
        <div class="alert alert-primary border-0 shadow-sm time-banner" role="alert">
          <div class="d-flex flex-column flex-xl-row justify-content-between gap-2">
            <div>
              <h2 id="candidate-title" class="h4 mb-1">考生資訊模式</h2>
              <p class="mb-0">報到時間：<strong>上午 08:30 ~ 09:00</strong>（逾時 10 分鐘視同棄權）</p>
            </div>
            <div class="fs-5">報到地點：<strong>本校人事室</strong></div>
          </div>
        </div>
        <div class="mb-3">
          <input id="candidateSearch" class="form-control form-control-lg shadow-sm" type="search" placeholder="🔍 輸入報考科目快速查詢（例：導師、自然、文書、木作）" />
        </div>
        <div id="candidateCards" class="job-card-grid"></div>
      </section>

      <section id="judgeView" class="view-panel" aria-labelledby="judge-title">
        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-lg-5">
                <label class="form-label fw-bold" for="judgeSelect">委員身分選擇</label>
                <select id="judgeSelect" class="form-select form-select-lg"></select>
              </div>
              <div class="col">
                <h2 id="judge-title" class="h4 mb-1">評審委員模式</h2>
                <p class="text-secondary mb-0">選擇委員後，只顯示該委員被指派的科目卡片。</p>
              </div>
            </div>
          </div>
        </div>
        <div id="judgeCards" class="job-card-grid"></div>
      </section>

      <section id="adminView" class="view-panel" aria-labelledby="admin-title">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-2 align-items-lg-end mb-3">
          <div>
            <p class="eyebrow mb-1">Staff & Admin View</p>
            <h2 id="admin-title" class="h3 mb-0">試務行政模式</h2>
          </div>
          <p class="text-secondary mb-0">所有資料異動會立即存入 localStorage 並同步三個視角。</p>
        </div>
        <div id="adminCards" class="admin-stack"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      [
        "qxes-subteacher-three-views",
        "qxes-subteacher-three-views-1150708-split-real",
        "qxes-subteacher-three-views-1150708-director-split-v2",
        "qxes-subteacher-three-views-1150708-director-split-v3",
        "qxes-subteacher-rooms",
        "qxes-subteacher-rooms-1150708-director-split-v3"
      ].forEach((key) => localStorage.removeItem(key));
    </script>
    <script src="today.js?v=1150708-director-split-v4"></script>
  </body>
</html>
