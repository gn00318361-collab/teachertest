<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>青溪國小代理代課教師甄試控制台｜即時數位評分同步版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="today.css" />
  </head>
  <body>
    <header class="hero-banner text-center shadow-sm">
      <div class="container-fluid px-3 px-lg-5">
        <h1 class="fw-bold h3 mb-2">桃園市桃園區青溪國民小學</h1>
        <p class="mb-2 lead fw-semibold">115學年度代理代課教師甄試控制台｜數位評分秒級同步版</p>
        <p class="badge bg-warning text-dark fs-6 mb-3">評審線上點選即時匯入後台，最後僅需列印總表簽名確認</p>
        <div class="d-flex flex-column flex-md-row justify-content-center gap-2 align-items-center">
          <span id="liveClock" class="badge bg-dark px-3 py-2">載入時間中...</span>
          <button id="resetThreeViews" class="btn btn-outline-light btn-sm fw-bold" type="button">重設畫面快取</button>
        </div>
      </div>
    </header>

    <main class="container-fluid px-3 px-lg-5 py-4">
      <section class="view-switch shadow-sm mb-4">
        <div class="row g-2 text-center">
          <div class="col-md-4">
            <button class="btn btn-primary btn-lg fw-bold view-button active w-100" data-view="candidate" type="button">考生資訊模式</button>
          </div>
          <div class="col-md-4">
            <button class="btn btn-outline-success btn-lg fw-bold view-button w-100" data-view="judge" type="button">評審線上評分模式</button>
          </div>
          <div class="col-md-4">
            <button class="btn btn-outline-warning btn-lg fw-bold view-button w-100" data-view="admin" type="button">試務同步看板</button>
          </div>
        </div>
      </section>

      <section id="candidateView" class="view-panel active" aria-labelledby="candidate-title">
        <div class="alert alert-primary border-0 shadow-sm time-banner" role="alert">
          <div class="d-flex flex-column flex-xl-row justify-content-between gap-2">
            <div>
              <h2 id="candidate-title" class="h4 mb-1">考生資訊模式</h2>
              <p class="mb-0">報到時間：<strong>上午 08:30 ~ 09:00</strong></p>
            </div>
            <div class="fs-5">報到地點：<strong>本校人事室</strong></div>
          </div>
        </div>
        <div class="mb-3">
          <input id="candidateSearch" class="form-control form-control-lg shadow-sm" type="search" placeholder="輸入報考科目、姓名或編號快速查詢" />
        </div>
        <div id="candidateCards" class="job-card-grid"></div>
      </section>

      <section id="judgeView" class="view-panel" aria-labelledby="judge-title">
        <div class="toolbar-panel shadow-sm mb-3">
          <div class="row g-3 align-items-end">
            <div class="col-12 col-lg-5">
              <label class="form-label fw-bold" for="judgeSelect">委員身分選擇</label>
              <select id="judgeSelect" class="form-select form-select-lg"></select>
            </div>
            <div class="col">
              <h2 id="judge-title" class="h4 mb-1">評審線上評分系統</h2>
              <p class="text-secondary mb-0">填寫各分項分數後送出，系統會自動計算總分並同步至 Google 試算表。</p>
            </div>
          </div>
        </div>
        <div id="judgeCards" class="job-card-grid"></div>
      </section>

      <section id="adminView" class="view-panel" aria-labelledby="admin-title">
        <div class="sync-panel bg-dark text-white p-3 mb-4 shadow-sm">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
            <div>
              <h3 id="admin-title" class="h5 mb-1">雲端即時分數同步狀態</h3>
              <p class="mb-0 text-white-50" id="syncStatus">系統每 5 秒自動撈取雲端評分進度。</p>
            </div>
            <button class="btn btn-outline-light btn-sm fw-bold" id="forceSyncBtn" type="button">立即強制同步</button>
          </div>
        </div>
        <div id="adminCards" class="admin-stack"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="today.js?v=1150708-live-sync-clean"></script>
  </body>
</html>
